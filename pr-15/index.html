<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Blocks — Preview</title>

  <!--
    Obsidian CSS custom-property fallbacks.
    The real plugin relies on Obsidian's theme to supply these tokens.
    Here we define light-mode defaults so styles.css renders correctly in any
    plain browser without Obsidian being present.
  -->
  <style>
    :root {
      /* Backgrounds */
      --background-primary:          #ffffff;
      --background-secondary:        #f5f6f8;
      --background-modifier-border:  #dde1e4;
      --background-modifier-hover:   #eef0f3;

      /* Text */
      --text-normal:   #2e3338;
      --text-muted:    #888d94;
      --text-accent:   #705dcf;
      --text-on-accent:#ffffff;
      --text-error:    #c0392b;
      --text-success:  #27ae60;

      /* Interactive */
      --interactive-accent: #7c3aed;

      /* Misc */
      --color-red:        #e74c3c;
      --font-monospace:   'Courier New', monospace;
    }

    /* ── Page chrome ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Helvetica, Arial, sans-serif;
      background: var(--background-primary);
      color: var(--text-normal);
    }

    /* Preview banner */
    #preview-banner {
      background: var(--interactive-accent);
      color: var(--text-on-accent);
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      padding: 6px 12px;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    /* Full-height wrapper */
    #wrapper {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Plugin mount point — fills remaining height */
    #app {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* tb-root needs an explicit height so the inner scroll works */
    #app .tb-root {
      height: 100%;
    }
  </style>

  <!-- Plugin stylesheet (copied here by the preview:build script) -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="wrapper">
    <div id="preview-banner">
      ⚡ Time Blocks — CI Preview &nbsp;|&nbsp; Placeholder data &nbsp;|&nbsp; Default light-mode styling
    </div>
    <div id="app"></div>
  </div>

  <!-- Plain-JS renderer — no bundler required -->
  <script src="render.js"></script>
</body>
</html>
